<title>夢こつ手帳</title>
<style>
:root{
  --bg:#F2F4EB; --card:#FBFCF7; --ink:#2F352C; --sub:#77806F;
  --line:#E2E6D8; --accent:#55803F; --accent-soft:#E7EFDC;
  --peach:#D97E4A; --peach-soft:#F8E9DE; --danger:#B25541;
  --shadow:0 1px 3px rgba(47,53,44,.07);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#191E18; --card:#232922; --ink:#EAEDE3; --sub:#99A28F;
    --line:#333B31; --accent:#9CC57F; --accent-soft:#2E3A28;
    --peach:#E39A6B; --peach-soft:#3A2E24; --danger:#DB8570;
    --shadow:0 1px 3px rgba(0,0,0,.3);
  }
}
:root[data-theme="light"]{
  --bg:#F2F4EB; --card:#FBFCF7; --ink:#2F352C; --sub:#77806F;
  --line:#E2E6D8; --accent:#55803F; --accent-soft:#E7EFDC;
  --peach:#D97E4A; --peach-soft:#F8E9DE; --danger:#B25541;
  --shadow:0 1px 3px rgba(47,53,44,.07);
}
:root[data-theme="dark"]{
  --bg:#191E18; --card:#232922; --ink:#EAEDE3; --sub:#99A28F;
  --line:#333B31; --accent:#9CC57F; --accent-soft:#2E3A28;
  --peach:#E39A6B; --peach-soft:#3A2E24; --danger:#DB8570;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);}
body{
  margin:0; color:var(--ink);
  font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  font-size:16px; line-height:1.6;
}
#app{max-width:480px; margin:0 auto; padding:14px 14px 92px;}
button{font:inherit; color:inherit; border:none; background:none; cursor:pointer; padding:0;}
button:focus-visible, input:focus-visible, textarea:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
input,textarea{font:inherit; color:var(--ink);}

/* ---------- header ---------- */
.top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin:4px 2px 14px;}
.appname{font-size:13px; letter-spacing:.18em; color:var(--sub); font-weight:700;}
.datebar{display:flex; align-items:center; gap:4px; margin-top:2px;}
.datebar .dlabel{font-size:22px; font-weight:800; letter-spacing:.02em; min-width:9em;}
.dbtn{width:34px; height:34px; border-radius:50%; font-size:17px; color:var(--sub); background:var(--card); box-shadow:var(--shadow);}
.dbtn:disabled{opacity:.3; cursor:default;}
.plant{text-align:center; background:var(--card); border-radius:16px; padding:8px 12px 6px; box-shadow:var(--shadow); min-width:86px;}
.plant .pico{font-size:26px; line-height:1.2; display:block;}
.plant .plabel{font-size:11px; color:var(--sub);}
.plant .pcount{font-size:12px; color:var(--accent); font-weight:700;}

/* ---------- quote ---------- */
.quote{text-align:center; padding:2px 12px 0; margin:0 0 10px;}
.quote small{display:block; color:var(--sub); font-size:10px; letter-spacing:.2em; margin-bottom:3px; font-weight:700;}
.quote .qtext{font-size:14px; line-height:1.6;}
.quote .qby{color:var(--sub); font-size:11px; margin-left:8px;}

/* ---------- cards ---------- */
.card{background:var(--card); border-radius:16px; padding:14px 16px; box-shadow:var(--shadow); margin-bottom:12px;}
.card h2{font-size:13px; color:var(--sub); letter-spacing:.12em; margin:0 0 10px; font-weight:700;}
.note{font-size:13px; color:var(--sub); margin:2px 2px 12px;}

/* ---------- habit rows ---------- */
.habit{
  display:flex; width:100%; align-items:center; gap:12px; text-align:left;
  background:var(--card); border-radius:16px; padding:13px 14px; box-shadow:var(--shadow);
  margin-bottom:10px; border:2px solid transparent; transition:border-color .15s, background .15s;
}
.habit.done{border-color:var(--accent); background:var(--accent-soft);}
.h-emoji{font-size:26px; width:34px; text-align:center; flex:none;}
.h-body{flex:1; min-width:0;}
.h-name{display:block; font-weight:800; font-size:16px;}
.h-hint{display:block; font-size:12px; color:var(--sub); line-height:1.45;}
.h-week{display:flex; gap:3px; margin-top:5px;}
.h-week i{width:8px; height:8px; border-radius:50%; background:var(--line);}
.h-week i.on{background:var(--accent);}
.h-week i.today{box-shadow:0 0 0 2px var(--accent-soft);}
.h-check{
  flex:none; width:34px; height:34px; border-radius:50%; border:2px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-size:18px; color:transparent;
  transition:transform .15s;
}
.habit.done .h-check{background:var(--accent); border-color:var(--accent); color:var(--card);}
@media (prefers-reduced-motion: no-preference){
  .habit.done .h-check{animation:pop .25s;}
  @keyframes pop{50%{transform:scale(1.25);}}
}

/* ---------- weight ---------- */
.wrow{display:flex; gap:8px; align-items:center;}
.wrow input{
  flex:1; min-width:0; font-size:20px; font-weight:700; padding:9px 12px;
  border:1.5px solid var(--line); border-radius:12px; background:var(--bg);
  font-variant-numeric:tabular-nums;
}
.wrow .unit{color:var(--sub); font-size:14px;}
.btn{
  background:var(--accent); color:var(--card); font-weight:800; border-radius:12px;
  padding:10px 18px; font-size:15px;
}
.btn.ghost{background:var(--accent-soft); color:var(--accent);}
.btn.danger{background:transparent; color:var(--danger); border:1.5px solid var(--danger); font-weight:700;}
.wsaved{font-size:13px; color:var(--accent); font-weight:700; margin-top:8px;}
.goalnums{display:flex; gap:12px; align-items:baseline; flex-wrap:wrap;}
.gbig{font-size:25px; font-weight:800; color:var(--peach); font-variant-numeric:tabular-nums;}
.gsub{font-size:13px; color:var(--sub);}
.pbar{position:relative; height:14px; background:var(--line); border-radius:999px; margin:12px 0 4px; overflow:hidden;}
.pfill{position:absolute; left:0; top:0; bottom:0; background:var(--accent); border-radius:999px; min-width:6px; transition:width .4s;}
.pends{display:flex; justify-content:space-between; font-size:11px; color:var(--sub); font-variant-numeric:tabular-nums;}
.wupd{margin-top:10px;}
.linkbtn{color:var(--accent); font-weight:700; font-size:14px; padding:6px 2px;}
.sect{font-size:12px; color:var(--sub); letter-spacing:.14em; margin:18px 4px 8px; font-weight:700;}
.sectsub{font-weight:400; letter-spacing:0; opacity:.85;}
.collectgrid{display:flex; flex-wrap:wrap; gap:8px;}
.citem{display:flex; flex-direction:column; align-items:center; font-size:26px; line-height:1.2; background:var(--accent-soft); border-radius:12px; padding:8px 10px 4px; min-width:52px;}
.citem small{font-size:10px; color:var(--sub); font-variant-numeric:tabular-nums;}
.tpick{font-size:14px; padding:9px 12px;}
.yearwrap{overflow-x:auto; padding-bottom:4px;}
.ygrid{display:grid; grid-template-columns:auto repeat(31, 9px); gap:2px; min-width:370px; align-items:center;}
.ymon{font-size:9px; color:var(--sub); padding-right:5px; text-align:right; white-space:nowrap;}
.ycell{width:9px; height:9px; border-radius:2px; background:var(--line); opacity:.45;}
.ycell.empty{opacity:0;}
.ycell.l1{background:var(--accent); opacity:.3;}
.ycell.l2{background:var(--accent); opacity:.55;}
.ycell.l3{background:var(--accent); opacity:.78;}
.ycell.l4{background:var(--accent); opacity:1;}

/* ---------- log view ---------- */
.bignum{font-size:26px; font-weight:800; font-variant-numeric:tabular-nums;}
.chartwrap{overflow-x:auto;}
.diff{font-size:13px; color:var(--sub); margin-top:4px;}
.diff b{color:var(--peach);}
.gridwrap{overflow-x:auto; padding-bottom:4px;}
.ggrid{display:grid; gap:4px; font-size:11px; color:var(--sub); min-width:340px;}
.gcell{width:17px; height:17px; border-radius:5px; background:var(--line); opacity:.55;}
.gcell.on{background:var(--accent); opacity:1;}
.gcell.future{opacity:.18;}
.glabel{white-space:nowrap; display:flex; align-items:center; font-size:14px;}
.gday{text-align:center; width:17px;}
.wk{display:flex; justify-content:space-between; align-items:baseline; padding:7px 2px; border-bottom:1px dashed var(--line); font-size:14px;}
.wk:last-child{border-bottom:none;}
.wk .cnt{font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums;}
.wk .cnt small{color:var(--sub); font-weight:400;}

/* ---------- settings ---------- */
.edit-row{border-bottom:1px dashed var(--line); padding:10px 0;}
.edit-row:last-child{border-bottom:none;}
.edit-line{display:flex; gap:8px; margin-bottom:6px;}
.edit-line input{border:1.5px solid var(--line); border-radius:10px; padding:7px 10px; background:var(--bg); font-size:16px;}
.in-emoji{width:56px; text-align:center; flex:none;}
.in-name{flex:1; min-width:0;}
.in-hint{flex:1; min-width:0; font-size:14px !important; color:var(--sub);}
.mini{font-size:13px; color:var(--danger); padding:4px 8px; font-weight:700;}
textarea.backup{
  width:100%; height:96px; border:1.5px solid var(--line); border-radius:12px;
  background:var(--bg); padding:10px; font-size:12px; font-family:ui-monospace,monospace;
}
.btnrow{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}

/* ---------- tab bar ---------- */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; gap:6px;
  background:var(--card); border-top:1px solid var(--line);
  padding:8px 10px calc(10px + env(safe-area-inset-bottom));
}
.tab{flex:1; max-width:150px; text-align:center; border-radius:12px; padding:7px 4px; color:var(--sub); font-size:12px; font-weight:700;}
.tab .ticon{display:block; font-size:19px;}
.tab.active{background:var(--accent-soft); color:var(--accent);}

/* ---------- toast ---------- */
#toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
  background:var(--ink); color:var(--bg); font-weight:800; font-size:15px;
  padding:9px 20px; border-radius:999px; opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s; white-space:nowrap; z-index:9;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
</style>

<div id="app">
  <header class="top">
    <div>
      <div class="appname">夢こつ手帳</div>
      <div class="datebar">
        <button class="dbtn" id="dprev" aria-label="前の日">‹</button>
        <span class="dlabel" id="dlabel"></span>
        <button class="dbtn" id="dnext" aria-label="次の日">›</button>
      </div>
    </div>
    <div class="plant" id="plant"></div>
  </header>

  <main>
    <section id="view-today"></section>
    <section id="view-log" hidden></section>
    <section id="view-set" hidden></section>
  </main>
</div>

<nav class="tabbar">
  <button class="tab active" data-tab="today"><span class="ticon">☀️</span>きょう</button>
  <button class="tab" data-tab="log"><span class="ticon">📈</span>きろく</button>
  <button class="tab" data-tab="set"><span class="ticon">⚙️</span>せってい</button>
</nav>

function todaysQuote(){
  /* 毎日ちがう1本を順ぐりに(全部めぐるまで同じ名言は出ない) */
  var d = parseKey(keyFor(0));
  var dayNum = Math.floor(d.getTime() / 86400000);
  var n = QUOTES.length, step = 37;
  while(gcd2(step, n) !== 1) step++;
  return QUOTES[((dayNum % n) * step) % n];
}
function gcd2(a, b){ while(b){ var t = a % b; a = b; b = t; } return a; }

/* --- dates: 深夜3時までは前日あつかい --- */
function shiftedNow(){ return new Date(Date.now() - 3*3600*1000); }
function fmt(d){
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function keyFor(offset){
  var d = shiftedNow(); d.setDate(d.getDate()+offset); return fmt(d);
}
function parseKey(k){
  var p = k.split("-"); return new Date(+p[0], +p[1]-1, +p[2]);
}
function labelFor(offset){
  var d = parseKey(keyFor(offset));
  var md = (d.getMonth()+1) + "/" + d.getDate() + "(" + WD[d.getDay()] + ")";
  if(offset===0) return "きょう " + md;
  if(offset===-1) return "きのう " + md;
  return md;
}
function weekKeys(){ /* 今週(月〜日)の7日ぶんのキー */
  var d = parseKey(keyFor(0));
  var dow = (d.getDay()+6)%7; /* 月=0 */
  d.setDate(d.getDate()-dow);
  var arr=[];
  for(var i=0;i<7;i++){ arr.push(fmt(d)); d.setDate(d.getDate()+1); }
  return arr;
}
function countIn(keys, habitId){
  var n=0;
  for(var i=0;i<keys.length;i++){ var day=S.log[keys[i]]; if(day && day[habitId]) n++; }
  return n;
}
function latestWeight(){
  var ks = Object.keys(S.weight).sort();
  if(!ks.length) return null;
  var k = ks[ks.length-1];
  return { k:k, v:S.weight[k] };
}
function dispDate(k){
  var d = parseKey(k);
  return (d.getMonth()+1) + "/" + d.getDate();
}

function bloomThreshold(){ /* 咲くラインは本丸(🌙)の数が基準。☀️のタップは全部ボーナス加点 */
  var core = 0;
  for(var i=0;i<S.habits.length;i++){ if(S.habits[i].time !== "asa") core++; }
  if(!core) core = S.habits.length;
  return Math.max(6, Math.ceil(core * 3.5));
}
function asaIdSet(){
  var m = {};
  for(var i=0;i<S.habits.length;i++){ if(S.habits[i].time==="asa") m[S.habits[i].id]=1; }
  return m;
}
function weekTotals(){ /* 週の頭(月曜)キー → その週の🌙タップ合計(☀️は花に数えない) */
  var m = {}, asa = asaIdSet();
  for(var k in S.log){
    var day = S.log[k], c = 0, id;
    for(id in day){ if(day[id] && !asa[id]) c++; }
    if(!c) continue;
    var d = parseKey(k);
    d.setDate(d.getDate() - (d.getDay()+6)%7);
    var wk = fmt(d);
    m[wk] = (m[wk]||0) + c;
  }
  return m;
}
function earnedWeeks(){ /* 咲ききった過去の週(今週はまだ育ち中) */
  var t3 = bloomThreshold(), cur = weekKeys()[0], totals = weekTotals();
  return Object.keys(totals).filter(function(w){ return w < cur && totals[w] >= t3; }).sort();
}

function weightChartSVG(){

  var from = todayT - 89*86400000;
  var pts = Object.keys(S.weight).map(function(k){
    return { t:parseKey(k).getTime(), v:S.weight[k] };
  }).filter(function(p){ return p.t >= from && p.t <= todayT; })
    .sort(function(a,b){ return a.t-b.t; });
  if(pts.length===0) return '<p class="note" style="margin:0">体重をきろくすると、ここにグラフが育ちます 🌱</p>';
  if(pts.length===1) return '<div class="bignum">'+pts[0].v+' kg</div><p class="note" style="margin:4px 0 0">あと1回きろくすると、線になります</p>';

  var W=320, H=150, pad=14, padL=38;
  var min=Infinity, max=-Infinity;
  pts.forEach(function(p){ if(p.v<min)min=p.v; if(p.v>max)max=p.v; });
  min-=0.4; max+=0.4;
  var tgt = (S.goal && S.goal.target != null) ? S.goal.target : null;
  if(tgt != null && tgt <= min && min - tgt <= 3) min = tgt - 0.3;
  if(tgt != null && tgt >= max && tgt - max <= 3) max = tgt + 0.3;
  var t0=pts[0].t, t1=pts[pts.length-1].t;
  function X(t){ return t1===t0 ? (padL+W)/2 : padL + (t-t0)/(t1-t0)*(W-padL-pad); }
  function Y(v){ return pad + (max-v)/(max-min)*(H-pad*2-14); }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" role="img" aria-label="体重の推移グラフ">';
  [max-0.4, (max+min)/2, min+0.4].forEach(function(gv){
    var gy = Y(gv);
    svg += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-pad)+'" y2="'+gy+'" stroke="var(--line)" stroke-width="1"/>' +
      '<text x="'+(padL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="var(--sub)">'+gv.toFixed(1)+'</text>';
  });
  if(tgt != null && tgt > min && tgt < max){
    var ty = Y(tgt);
    svg += '<line x1="'+padL+'" y1="'+ty+'" x2="'+(W-pad)+'" y2="'+ty+'" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4"/>' +
      '<text x="'+(W-pad)+'" y="'+(ty-5)+'" text-anchor="end" font-size="10" fill="var(--accent)">🌸 もくひょう '+tgt.toFixed(1)+'</text>';
  }
  var path = "";
  pts.forEach(function(p,i){ path += (i?"L":"M") + X(p.t).toFixed(1) + " " + Y(p.v).toFixed(1) + " "; });
  svg += '<path d="'+path+'" fill="none" stroke="var(--peach)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  pts.forEach(function(p){
    svg += '<circle cx="'+X(p.t).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="3" fill="var(--peach)"/>';
  });
  var last = pts[pts.length-1];
  svg += '<circle cx="'+X(last.t).toFixed(1)+'" cy="'+Y(last.v).toFixed(1)+'" r="5.5" fill="var(--peach)" stroke="var(--card)" stroke-width="2"/>';
  svg += '</svg>';
  var diff = Math.round((last.v - pts[0].v)*10)/10;
  var days = Math.round((last.t - pts[0].t)/86400000);
  var dtxt = diff===0 ? "キープ中(それも立派)" :
    (days+"日で <b>"+(diff>0?"+":"−")+Math.abs(diff)+" kg</b>" + (diff<0 ? " やせました 🎉" : "(水分のいたずら。気にしない)"));
  return '<div class="bignum">'+last.v+' <small style="font-size:14px;color:var(--sub)">kg(さいしん)</small></div>' +
    '<div class="chartwrap">'+svg+'</div><div class="diff">'+dtxt+'</div>';
}

function renderLog(){
  var td = themeDef(), t3 = bloomThreshold();
  var earned = earnedWeeks();
  var wkNow = weekKeys(), totalNow = 0;
  for(var i=0;i<S.habits.length;i++){
    if(S.habits[i].time !== "asa") totalNow += countIn(wkNow, S.habits[i].id);
  }
  var chtml = '<div class="card"><h2>あつめた'+esc(td.collectName)+'</h2>';
  if(earned.length){
    chtml += '<div class="collectgrid">';
    earned.forEach(function(w){
      chtml += '<span class="citem">'+td.collect+'<small>'+dispDate(w)+'〜</small></span>';
    });
    chtml += '</div>';
  }else{
    chtml += '<p class="note" style="margin:0">🌙(よる)の合計が週'+t3+'こまで育つと、つぎの月曜にここへ増えます。</p>';
  }
  if(totalNow >= t3){
    chtml += '<p class="note" style="margin:8px 0 0">'+td.stages[3][0]+' こんしゅうのぶんは、月曜に'+esc(td.collectName)+'になります!</p>';
  }
  chtml += '</div>';

  /* ☀️ 未来貯金(朝活の積み立て。花には数えない) */
  var mcard = "";
  var asaList = S.habits.filter(function(h){ return h.time==="asa"; });
  if(asaList.length){
    var nowK = keyFor(0), ym = nowK.slice(0,7), yr = nowK.slice(0,4);
    var arows = "", tAll = 0;
    asaList.forEach(function(h){
      var cm = 0, cy = 0, ca = 0;
      for(var lk in S.log){
        if(S.log[lk][h.id]){
          ca++;
          if(lk.slice(0,4)===yr) cy++;
          if(lk.slice(0,7)===ym) cm++;
        }
      }
      tAll += ca;
      arows += '<div class="wk"><span>'+esc(h.emoji)+' '+esc(h.name)+'</span>' +
        '<span class="cnt">今月 '+cm+'回 <small>/ 今年 '+cy+' / 通算 '+ca+'</small></span></div>';
    });
    mcard = '<div class="card"><h2>あさの積み立て</h2>' + arows +
      '<p class="note" style="margin:10px 0 0">通算 '+tAll+'回。花には数えない、減らない、静かに貯まる資産です。</p></div>';
  }

  var html = '<p class="sect">🌸 ゆめ(ダイエット)</p>' + chtml +
    '<div class="card"><h2>たいじゅう(90日)</h2>' + weightChartSVG() + '</div>';

  /* おきた時間(7日) */
  var wakes = [];
  for(var wo=-6; wo<=0; wo++){
    var wkk = keyFor(wo);
    if(S.wake && S.wake[wkk]) wakes.push({k:wkk, v:S.wake[wkk]});
  }
  var wcard = '<div class="card"><h2>おきた時間(7日)</h2>';
  if(wakes.length){
    var mins = 0, wrows = "";
    wakes.forEach(function(w){
      var p = w.v.split(":");
      mins += (+p[0])*60 + (+p[1]);
      wrows += '<div class="wk"><span>⏰ '+dispDate(w.k)+'</span><span class="cnt">'+w.v+'</span></div>';
    });
    var avg = Math.round(mins/wakes.length);
    wcard += wrows + '<p class="note" style="margin:8px 0 0">7日平均 '+String(Math.floor(avg/60)).padStart(2,"0")+':'+String(avg%60).padStart(2,"0")+'</p>';
  }else{
    wcard += '<p class="note" style="margin:0">「きょう」の おきた時間 から記録できます</p>';
  }
  wcard += '</div>';
  html += '<p class="sect">💰 未来貯金(あさ)</p>' + mcard + wcard;
  html += '<p class="sect">📋 ふりかえり</p>';

  /* 14日グリッド */
  var keys=[]; for(var o=-13;o<=0;o++) keys.push(keyFor(o));
  var cols = keys.length;
  var grid = '<div class="ggrid" style="grid-template-columns:auto repeat('+cols+',17px)">';
  grid += '<span></span>';
  keys.forEach(function(k){ grid += '<span class="gday">'+parseKey(k).getDate()+'</span>'; });
  S.habits.forEach(function(h){
    grid += '<span class="glabel">'+esc(h.emoji)+'</span>';
    keys.forEach(function(k){
      var on = S.log[k] && S.log[k][h.id];
      grid += '<span class="gcell'+(on?" on":"")+'"></span>';
    });
  });
  grid += '</div>';
  html += '<div class="card"><h2>この14日</h2><div class="gridwrap">'+grid+'</div></div>';

  /* 今週・先週 */
  var wk = weekKeys();
  var lastWk = wk.map(function(k){ var d=parseKey(k); d.setDate(d.getDate()-7); return fmt(d); });
  var rows = "";
  S.habits.forEach(function(h){
    rows += '<div class="wk"><span>'+esc(h.emoji)+' '+esc(h.name)+'</span>' +
      '<span class="cnt">'+countIn(wk,h.id)+'回 <small>(先週 '+countIn(lastWk,h.id)+'回)</small></span></div>';
  });
  html += '<div class="card"><h2>こんしゅうの回数</h2>'+rows+
    '<p class="note" style="margin:10px 0 0">0回の週があっても、また始めればチャラです。</p></div>';

  /* ことしの畑(年間ヒートマップ、タップで開閉) */
  var yr = keyFor(0).slice(0,4);
  var ycard = '<div class="card"><h2>ことしの畑('+yr+'年)</h2>';
  if(yearOpen){
    var dayTotals = {}, yearTaps = 0;
    for(var lk2 in S.log){
      if(lk2.slice(0,4) !== yr) continue;
      var cc = 0;
      for(var id2 in S.log[lk2]){ if(S.log[lk2][id2]) cc++; }
      if(cc){ dayTotals[lk2] = cc; yearTaps += cc; }
    }
    var yg = '<div class="yearwrap"><div class="ygrid">';
    for(var mo=0; mo<12; mo++){
      yg += '<span class="ymon">'+(mo+1)+'月</span>';
      var dim = new Date(+yr, mo+1, 0).getDate();
      for(var dd=1; dd<=31; dd++){
        if(dd <= dim){
          var dk = yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
          var cv = dayTotals[dk] || 0;
          var lv = cv>=6 ? 4 : cv>=4 ? 3 : cv>=2 ? 2 : cv>=1 ? 1 : 0;
          yg += '<span class="ycell'+(lv?' l'+lv:'')+'"></span>';
        }else{
          yg += '<span class="ycell empty"></span>';
        }
      }
    }
    yg += '</div></div>';
    var yFlowers = earnedWeeks().filter(function(w){ return w.slice(0,4)===yr; }).length;
    var asaSet = asaIdSet(), yChokin = 0;
    for(var lk3 in S.log){
      if(lk3.slice(0,4) !== yr) continue;
      for(var id3 in S.log[lk3]){ if(S.log[lk3][id3] && asaSet[id3]) yChokin++; }
    }
    ycard += yg +
      '<p class="note" style="margin:8px 0 0">色がこい日ほどタップが多い日。ことしの合計 '+yearTaps+'回 / '+themeDef().collect+'×'+yFlowers+' / ☀️貯金 '+yChokin+'回</p>' +
      '<button class="linkbtn" id="yearbtn">とじる</button>';
  }else{
    ycard += '<button class="linkbtn" id="yearbtn">📅 タップで1年ぜんぶみる</button>';
  }
  ycard += '</div>';
  html += ycard;

  document.getElementById("view-log").innerHTML = html;
  var gw = document.querySelector("#view-log .gridwrap");
  if(gw) gw.scrollLeft = gw.scrollWidth;
  var yb = document.getElementById("yearbtn");
  if(yb) yb.addEventListener("click", function(){ yearOpen = !yearOpen; renderLog(); });
}

/* --- settings --- */
function renderSet(){
  var html = '<div class="card"><h2>しゅうかんの編集</h2><div id="hedit">';
  S.habits.forEach(function(h,i){
    html += '<div class="edit-row" data-i="'+i+'">' +
      '<div class="edit-line">' +
      '<input class="in-emoji" value="'+esc(h.emoji)+'" maxlength="4" aria-label="絵文字">' +
      '<input class="in-name" value="'+esc(h.name)+'" maxlength="14" aria-label="名前">' +
      '<button class="mini tglt" style="color:var(--accent)" aria-label="あさ・よる切替">'+(h.time==="asa"?"☀️":"🌙")+'</button>' +
      '<button class="mini act-del">けす</button></div>' +
      '<div class="edit-line"><input class="in-hint" value="'+esc(h.hint)+'" maxlength="40" aria-label="ヒント"></div>' +
      '</div>';
  });
  html += '</div><div class="btnrow"><button class="btn ghost" id="haddbtn">+ ふやす</button>' +
    '<button class="btn" id="hsavebtn">変更をほぞん</button></div></div>';

  var tdcur = S.theme || "hana";
  html += '<div class="card"><h2>そだてるもの</h2><div class="btnrow">';
  Object.keys(THEMES).forEach(function(key){
    var t = THEMES[key];
    html += '<button class="btn '+(key===tdcur?"":"ghost")+' tpick" data-t="'+key+'">'+t.stages[3][0]+' '+esc(t.name)+'</button>';
  });
  html += '</div><p class="note" style="margin:8px 0 0">'+themeDef().stages.map(function(s){return s[0];}).join(" → ")+' と育って、'+themeDef().collect+' があつまります</p></div>';

  var g = S.goal || {};
  html += '<div class="card"><h2>もくひょう体重</h2>' +
    '<div class="edit-line">' +
    '<input class="in-name" id="set-gstart" type="number" inputmode="decimal" step="0.1" min="20" max="200" value="' + (g.start != null ? g.start : "") + '" placeholder="スタート" aria-label="スタート体重">' +
    '<input class="in-name" id="set-gtarget" type="number" inputmode="decimal" step="0.1" min="20" max="200" value="' + (g.target != null ? g.target : "") + '" placeholder="もくひょう" aria-label="目標体重"></div>' +
    '<div class="btnrow"><button class="btn ghost" id="set-gsave">もくひょうをほぞん</button></div></div>';

  html += '<div class="card"><h2>バックアップ</h2>' +
    '<p class="note" style="margin:0 0 8px">データはこのスマホの中だけに保存されます。機種変更の前に「書き出す」の文字をコピーして、LINEのKeepメモなどに貼っておくと安心です。</p>' +
    '<textarea class="backup" id="bktext" placeholder="ここに貼り付けて「読み込む」"></textarea>' +
    '<div class="btnrow"><button class="btn ghost" id="bkout">書き出す</button>' +
    '<button class="btn ghost" id="bkin">読み込む</button></div></div>';

  html += '<div class="card"><h2>そのほか</h2>' +
    '<p class="note" style="margin:0 0 10px">🌙 夜ふかしさん仕様:深夜3時までの記録は「前日」の分になります。<br>‹ ボタンで7日前までさかのぼって記録できます。</p>' +
    '<button class="btn danger" id="wipe">データをぜんぶ消す</button></div>';

  document.getElementById("view-set").innerHTML = html;

  var tpicks = document.querySelectorAll(".tpick");
  for(var tp=0;tp<tpicks.length;tp++){
    tpicks[tp].addEventListener("click", function(){
      S.theme = this.getAttribute("data-t");
      save(); toast(themeDef().name + " にきまり!");
      renderSet(); renderHeader();
    });
  }
  document.getElementById("set-gsave").addEventListener("click", function(){
    var st = parseFloat(document.getElementById("set-gstart").value);
    var tg = parseFloat(document.getElementById("set-gtarget").value);
    if(!(st >= 20 && st <= 200) || !(tg >= 20 && tg <= 200)){ toast("2つとも数字で入れてね"); return; }
    S.goal = { start: Math.round(st*10)/10, target: Math.round(tg*10)/10 };
    save(); toast("ほぞんしました 🌸"); renderHeader();
  });
  document.getElementById("hsavebtn").addEventListener("click", function(){
    var rows = document.querySelectorAll("#hedit .edit-row");
    for(var i=0;i<rows.length;i++){
      var r = rows[i], idx = +r.getAttribute("data-i");
      var name = r.querySelector(".in-name").value.trim();
      if(name) S.habits[idx].name = name;
      S.habits[idx].emoji = r.querySelector(".in-emoji").value.trim() || "✅";
      S.habits[idx].hint = r.querySelector(".in-hint").value.trim();
    }
    save(); toast("ほぞんしました"); renderSet(); renderHeader();
  });
  document.getElementById("haddbtn").addEventListener("click", function(){
    S.habits.push({id:"h"+Date.now(), emoji:"✨", name:"あたらしい習慣", hint:"", time:"yoru"});
    save(); renderSet();
  });
  var tgls = document.querySelectorAll("#hedit .tglt");
  for(var tg=0;tg<tgls.length;tg++){
    tgls[tg].addEventListener("click", function(){
      var idx = +this.closest(".edit-row").getAttribute("data-i");
      S.habits[idx].time = S.habits[idx].time==="asa" ? "yoru" : "asa";
      save(); toast(S.habits[idx].time==="asa" ? "あさに移動 ☀️" : "よるに移動 🌙");
      renderSet();
    });
  }
  var dels = document.querySelectorAll("#hedit .act-del");
  for(var d=0;d<dels.length;d++){
    dels[d].addEventListener("click", function(){
      var row = this.closest(".edit-row"), idx = +row.getAttribute("data-i");
      var id = S.habits[idx].id;
      if(pendingConfirm["del"+id]){
        delete pendingConfirm["del"+id];
        S.habits.splice(idx,1);
        save(); toast("けしました"); renderSet(); renderHeader();
      }else{
        pendingConfirm["del"+id] = true;
        this.textContent = "ほんとにけす?";
        toast("もう一度おすと消えます");
      }
    });
  }
  document.getElementById("bkout").addEventListener("click", function(){
    var txt = JSON.stringify(S);
    var ta = document.getElementById("bktext");
    ta.value = txt; ta.select();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){ toast("コピーしました 📋"); },
        function(){ toast("全選択したのでコピーしてね"); });
    }else toast("全選択したのでコピーしてね");
  });
  document.getElementById("bkin").addEventListener("click", function(){
    var ta = document.getElementById("bktext");
    var s;
    try{ s = JSON.parse(ta.value); }catch(e){ toast("読み込めない形式でした"); return; }
    if(!s || !s.habits || !s.log){ toast("バックアップの文字ではないみたい"); return; }
    if(pendingConfirm.imp){
      delete pendingConfirm.imp;
      S = s; save(); toast("読み込みました ✓");
      renderHeader(); renderToday(); renderLog(); renderSet();
    }else{
      pendingConfirm.imp = true;
      toast("もう一度おすと上書きされます");
    }
  });
  document.getElementById("wipe").addEventListener("click", function(){
    if(pendingConfirm.wipe){
      delete pendingConfirm.wipe;
      S = defaults(); save();
      toast("まっさらにしました");
      renderHeader(); renderToday(); renderLog(); renderSet();
    }else{
      pendingConfirm.wipe = true;
      this.textContent = "ほんとに消す?(もう一度)";
      toast("もう一度おすと全部消えます");
    }
  });
}

/* --- tabs & nav --- */
function show(){
  document.getElementById("view-today").hidden = tab!=="today";
  document.getElementById("view-log").hidden = tab!=="log";
  document.getElementById("view-set").hidden = tab!=="set";
  var tabs = document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++)
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-tab")===tab);
  if(tab==="today") renderToday();
  if(tab==="log") renderLog();
  if(tab==="set"){ pendingConfirm={}; renderSet(); }
  renderHeader();
}
var tabBtns = document.querySelectorAll(".tab");
for(var i=0;i<tabBtns.length;i++){
  tabBtns[i].addEventListener("click", function(){
    tab = this.getAttribute("data-tab"); show();
  });
}
document.getElementById("dprev").addEventListener("click", function(){
  if(dayOffset>-7){ dayOffset--; renderHeader(); renderToday(); }
});
document.getElementById("dnext").addEventListener("click", function(){
  if(dayOffset<0){ dayOffset++; renderHeader(); renderToday(); }
});

show();
})();
</script>
